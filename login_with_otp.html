                  inputmode="numeric"
                  pattern="[0-9]*"
                  maxlength="1"
                  class="otp-input h-14 rounded-xl border-2 border-zinc-700"
                  data-index="2"
                  aria-label="رقم سوم"
                />
                <input
                  type="text"
                  inputmode="numeric"
                  pattern="[0-9]*"
                  maxlength="1"
                  class="otp-input h-14 rounded-xl border-2 border-zinc-700"
                  data-index="3"
                  aria-label="رقم چهارم"
                />
              </div>

              <p
                id="error-message"
                class="text-center text-sm text-red-400 mb-4 opacity-0 transition-opacity duration-200"
                role="alert"
                aria-live="polite"
              >
                کد وارد شده صحیح نیست. دوباره تلاش کنید.
              </p>

              <button
                type="submit"
                id="submit-btn"
                class="btn-primary w-full py-3.5 px-4 rounded-xl text-base font-semibold text-white flex items-center justify-center gap-2"
              >
                <span id="btn-text">تایید و ورود</span>
                <span id="btn-spinner" class="hidden" aria-hidden="true">
                  <svg
                    id="btn-spinner-icon"
                    class="h-5 w-5"
                    viewBox="0 0 24 24"
                    fill="none"
                  >
                    <circle
                      class="opacity-25"
                      cx="12"
                      cy="12"
                      r="10"
                      stroke="currentColor"
                      stroke-width="4"
                    />
                    <path
                      class="opacity-90"
                      fill="currentColor"
                      d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"
                    />
                  </svg>
                </span>
              </button>
            </fieldset>
          </form>

          <footer class="mt-6 text-center">
            <p class="text-sm text-zinc-400">
              کد را دریافت نکردید؟
              <button
                type="button"
                id="resend-btn"
                class="text-orange-400 font-medium transition duration-200 cursor-not-allowed opacity-50"
                disabled
              >
                ارسال مجدد کد
              </button>
            </p>
            <p class="text-xs text-zinc-500 mt-1">
              امکان ارسال مجدد تا
              <span
                id="timer-display"
                class="text-orange-400 font-semibold tabular-nums"
                dir="ltr"
                >۰۲:۰۰</span
              >
            </p>
          </footer>
        </div>

        <div
          id="otp-step-success"
          class="hidden text-center"
          aria-live="polite"
        >
          <div class="success-check-wrap mb-6">
            <div class="success-check-ring"></div>
            <div class="success-check-circle">
              <svg
                class="success-check-icon"
                viewBox="0 0 52 52"
                aria-hidden="true"
              >
                <circle
                  class="success-check-circle-bg"
                  cx="26"
                  cy="26"
                  r="25"
                  fill="none"
                />
                <path
                  class="success-check-path"
                  fill="none"
                  d="M14 27l7 7 16-16"
                />
              </svg>
            </div>
          </div>
          <h2 class="text-2xl sm:text-3xl font-bold text-emerald-400 mb-2">
            ورود موفق!
          </h2>
          <p class="text-sm sm:text-base text-zinc-400 mb-1">
            به حساب کاربری خوش آمدید
          </p>
          <p class="text-xs text-emerald-500/80 mb-8">
            احراز هویت با موفقیت انجام شد
          </p>
          <div class="flex flex-col gap-3">
            <button
              type="button"
              id="success-continue-btn"
              class="btn-success w-full py-3.5 px-4 rounded-xl text-base font-semibold text-white"
            >
              ورود به داشبورد
            </button>
            <button
              type="button"
              id="success-back-btn"
              class="btn-back w-full py-3 px-4 rounded-xl text-base font-medium"
            >
              بازگشت
            </button>
          </div>
        </div>
      </article>
    </main>
  </body>
</html>
