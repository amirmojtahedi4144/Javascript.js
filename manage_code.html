<!doctype html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>مدیریت قطعه‌کدها | Code Snippet Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Vazirmatn", sans-serif;
      }
      .snippet-card {
        transition: all 0.2s;
      }
      .snippet-card:hover {
        transform: translateY(-2px);
      }
    </style>
  </head>
  <body class="bg-gray-50">
    <div class="min-h-screen">
      <!-- Header -->
      <header class="bg-white shadow-sm">
        <div class="max-w-7xl mx-auto px-4 py-6">
          <h1 class="text-3xl font-bold">مدیریت قطعه‌کدها</h1>
          <p class="text-gray-600">ذخیره و مدیریت قطعه‌کدهای پرکاربرد</p>
        </div>
      </header>

      <!-- Main Content -->
      <main class="max-w-7xl mx-auto px-4 py-6">
        <div class="flex justify-end mb-6">
          <button
            id="addSnippetBtn"
            class="bg-blue-600 text-white px-4 py-2 rounded-lg flex items-center gap-2 hover:bg-blue-700"
          >
            <svg
              class="w-5 h-5"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M12 4v16m8-8H4"
              />
            </svg>
            افزودن قطعه‌کد جدید
          </button>
        </div>

        <!-- Search and Filter -->
        <div class="bg-white p-4 rounded-lg shadow mb-6">
          <div class="flex flex-col md:flex-row gap-4">
            <input
              type="text"
              id="searchInput"
              placeholder="جستجو در قطعه‌کدها..."
              class="flex-1 px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500"
            />
            <select
              id="languageFilter"
              class="w-full md:w-48 px-4 py-2 border rounded-lg"
            >
              <option value="">همه زبان‌ها</option>
              <option value="javascript">JavaScript</option>
              <option value="python">Python</option>
              <option value="html">HTML</option>
              <option value="css">CSS</option>
              <option value="sql">SQL</option>
              <option value="bash">Bash</option>
              <option value="json">JSON</option>
              <option value="other">سایر</option>
            </select>
          </div>
        </div>

        <!-- Snippets List -->
        <div
          id="snippetsList"
          class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"
        >
          <!-- Will be filled by JavaScript -->
        </div>

        <!-- Empty State -->
        <div id="emptyState" class="text-center py-12">
          <div class="text-gray-400 mx-auto w-16 h-16 mb-4">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="1"
                d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"
              />
            </svg>
          </div>
          <h3 class="text-lg font-medium">قطعه‌کدی یافت نشد</h3>
          <p class="text-gray-500 mt-1">
            برای شروع، اولین قطعه‌کد خود را اضافه کنید.
          </p>
          <button
            id="addFirstSnippetBtn"
            class="mt-4 px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700"
          >
            افزودن قطعه‌کد جدید
          </button>
        </div>
      </main>
    </div>

    <!-- Snippet Modal -->
    <div
      id="snippetModal"
      class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center p-4 z-50"
    >
      <div
        class="bg-white rounded-lg shadow-xl w-full max-w-3xl max-h-[90vh] flex flex-col"
      >
        <div class="px-6 py-4 border-b flex justify-between items-center">
          <h3 class="text-lg font-medium" id="modalTitle">
            افزودن قطعه‌کد جدید
          </h3>
          <button id="closeModal" class="text-gray-500 hover:text-gray-700">
            <svg
              class="w-6 h-6"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M6 18L18 6M6 6l12 12"
              />
            </svg>
          </button>
        </div>
        <form id="snippetForm" class="p-6 space-y-4 overflow-y-auto">
          <input type="hidden" id="snippetId" />

          <div>
            <label for="snippetTitle" class="block text-sm font-medium mb-1"
              >عنوان</label
            >
            <input
              type="text"
              id="snippetTitle"
              class="w-full px-3 py-2 border rounded-lg"
              required
            />
          </div>

          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
              <label
                for="snippetLanguage"
                class="block text-sm font-medium mb-1"
                >زبان برنامه‌نویسی</label
              >
              <select
                id="snippetLanguage"
                class="w-full px-3 py-2 border rounded-lg"
                required
              >
                <option value="javascript">JavaScript</option>
                <option value="python">Python</option>
                <option value="html">HTML</option>
                <option value="css">CSS</option>
                <option value="sql">SQL</option>
                <option value="bash">Bash</option>
                <option value="json">JSON</option>
                <option value="other">سایر</option>
              </select>
            </div>
            <div>
              <label for="snippetTags" class="block text-sm font-medium mb-1"
                >برچسب‌ها (با کاما جدا کنید)</label
              >
              <input
                type="text"
                id="snippetTags"
                class="w-full px-3 py-2 border rounded-lg"
                placeholder="مثال: فرم, اعتبارسنجی, ری‌اکت"
              />
            </div>
          </div>

          <div>
            <label for="snippetCode" class="block text-sm font-medium mb-1"
              >کد</label
            >
            <textarea
              id="snippetCode"
              rows="8"
              class="w-full px-3 py-2 border rounded-lg font-mono text-sm"
              required
            ></textarea>
          </div>

          <div>
            <label
              for="snippetDescription"
              class="block text-sm font-medium mb-1"
              >توضیحات (اختیاری)</label
            >
            <textarea
              id="snippetDescription"
              rows="3"
              class="w-full px-3 py-2 border rounded-lg"
            ></textarea>
          </div>

          <div class="flex justify-end gap-3 pt-4">
            <button
              type="button"
              id="cancelBtn"
              class="px-4 py-2 border border-gray-300 rounded-lg hover:bg-gray-50"
            >
              انصراف
            </button>
            <button
              type="submit"
              class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700"
            >
              ذخیره
            </button>
          </div>
        </form>
      </div>
    </div>

    <script src="assets/JS/manage_code.js"></script>
  </body>
</html>
